name: Build & Release Skill

# On every push that changes the skill (or its version), rebuild the distributable
# ZIP and commit it back. If the version declared in marketplace.json doesn't yet have
# a release, cut a GitHub release with the ZIP attached. Bump the version in
# .claude-plugin/marketplace.json to trigger a new release. The manual workflow_dispatch
# with a bump level remains available as an escape hatch.

on:
  push:
    branches: [main]
    paths:
      - 'revel-gadget-skill/**'
      - '.claude-plugin/marketplace.json'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Force a semver bump from the latest tag (blank = release the marketplace.json version)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build ZIP
        run: |
          cd ${{ github.workspace }}
          rm -f revel-gadget-skill.zip
          zip -r revel-gadget-skill.zip revel-gadget-skill/ \
            -x "revel-gadget-skill/.DS_Store" \
            -x "revel-gadget-skill/**/.DS_Store"

      - name: Commit ZIP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add revel-gadget-skill.zip
          git diff --cached --quiet || git commit -m "Rebuild revel-gadget-skill.zip [skip ci]"
          git push

      - name: Determine release version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.bump }}" ]; then
            # Manual: bump from the latest existing tag.
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1); [ -z "$LATEST" ] && LATEST="v0.0.0"
            IFS='.' read -r MA MI PA <<< "${LATEST#v}"
            case "${{ inputs.bump }}" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              patch) PA=$((PA+1)) ;;
            esac
            TAG="v${MA}.${MI}.${PA}"
          else
            # Automatic: use the version declared in marketplace.json.
            TAG="v$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Skip only if the RELEASE itself exists. The tag is NOT a valid proxy: tagging
          # and releasing are separate steps, so a failure between them strands a tag with
          # no release — and keying off the tag would then skip that release forever.
          #
          # A transient API error must not be read as "no release" (re-releases) or as
          # "release exists" (skips forever). Retry, then fail loudly so a re-run can fix it.
          for attempt in 1 2 3 4 5; do
            if OUT=$(gh api "repos/$REPO/releases/tags/$TAG" 2>&1); then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Release $TAG already exists — skipping release."
              exit 0
            fi
            if grep -qi 'not found\|HTTP 404' <<<"$OUT"; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "No release $TAG yet — will release."
              exit 0
            fi
            echo "Attempt $attempt: release lookup failed, retrying: $(head -c 200 <<<"$OUT")"
            sleep $((attempt * 10))
          done
          echo "::error::Could not determine whether release $TAG exists (GitHub API degraded?). Re-run this job once the API recovers."
          exit 1

      - name: Tag the release commit
        if: steps.ver.outputs.skip == 'false'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          # Idempotent: an earlier run may have pushed the tag but failed before creating
          # the release. Reuse the existing tag rather than moving it.
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — reusing it."
          else
            git tag "$TAG"
          fi
          git push origin "refs/tags/$TAG" || echo "Tag $TAG is already on the remote — reusing it."

      - name: Create Release
        if: steps.ver.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: revel-gadget-skill.zip
          generate_release_notes: true
