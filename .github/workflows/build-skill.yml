name: Build Skill ZIP

on:
  push:
    branches: [main]
    paths:
      - 'revel-gadget-skill/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd ${{ github.workspace }}
          rm -f revel-gadget-skill.zip
          zip -r revel-gadget-skill.zip revel-gadget-skill/ \
            -x "revel-gadget-skill/.DS_Store" \
            -x "revel-gadget-skill/**/.DS_Store"

      - name: Commit ZIP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add revel-gadget-skill.zip
          git diff --cached --quiet || git commit -m "Rebuild revel-gadget-skill.zip"
          git push
